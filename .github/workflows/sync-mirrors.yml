name: Sync Mirrors

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mirror:
          - nc-mirror-1
          - nc-mirror-2
          - nc-mirror-3
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Sync to mirror
        env:
          TOKEN: ${{ secrets.MIRROR_SYNC_TOKEN }}
          MIRROR_NAME: ${{ matrix.mirror }}
        run: |
          set -euo pipefail
          MIRROR_DIR="/tmp/${MIRROR_NAME}"
          git config --global user.email "dovnaravwork@gmail.com"
          git config --global user.name "Mirror Sync Bot"
          git clone "https://x-access-token:${TOKEN}@github.com/dovnaravwork/${MIRROR_NAME}.git" "${MIRROR_DIR}"
          find "${MIRROR_DIR}" -maxdepth 1 -not -name '.git' -not -name 'CNAME' -not -name '.' -not -path "${MIRROR_DIR}" -exec rm -rf {} +
          for file in *; do
            case "$file" in CNAME|.git|.github) continue ;; esac
            cp -r "$file" "${MIRROR_DIR}/"
          done
          cd "${MIRROR_DIR}"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync for ${MIRROR_NAME}"
          else
            git commit -m "sync: mirror update from netcloak-landing"
            git push
          fi
