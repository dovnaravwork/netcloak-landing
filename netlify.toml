[build]
  publish = "."

[build.processing.html]
  pretty_urls = false

[[redirects]]
  from = "/site-api/*"
  to = "https://api.netcloak.win/site-api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://api.netcloak.win/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/internal/*"
  to = "https://api.netcloak.win/internal/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/buy/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
